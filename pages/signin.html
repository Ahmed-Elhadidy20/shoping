<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="../images/bag-shopping-solid.svg" type="image/x-icon">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/pages/signin.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/pages/footer.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>تسجيل الدخول — الحديدي</title>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <i class="fa-solid fa-bag-shopping"></i>
        <span>الحديدي</span>
      </div>
      <h1>تسجيل الدخول</h1>
      <div class="form-grp">
        <label><i class="fa-solid fa-envelope"></i> البريد الإلكتروني</label>
        <input type="email" placeholder="example@mail.com" />
      </div>
      <div class="form-grp">
        <label><i class="fa-solid fa-lock"></i> كلمة المرور</label>
        <input type="password" placeholder="••••••••" />
      </div>
      <button class="btn-auth">تسجيل الدخول</button>
      <p class="auth-switch">ليس لديك حساب؟ <a href="./register.html">إنشاء حساب</a></p>
      <a href="../index.html" class="back-home"><i class="fa-solid fa-arrow-right"></i> العودة للمتجر</a>
    </div>
  </div>
  <style>
    .auth-container { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bodyBG); }
    .auth-card { background:#fff; padding:2.5rem 2rem; border-radius:12px; box-shadow:0 4px 24px rgba(0,0,0,0.1); width:100%; max-width:380px; text-align:center; }
    .auth-logo { display:flex; align-items:center; justify-content:center; gap:0.5rem; margin-bottom:1.2rem; }
    .auth-logo i { color:var(--numberColor); font-size:1.5rem; }
    .auth-logo span { font-family:'Cairo',sans-serif; font-weight:900; font-size:1.3rem; }
    .auth-card h1 { font-family:'Cairo',sans-serif; font-size:1.2rem; margin-bottom:1.5rem; color:var(--bodyFont); }
    .form-grp { text-align:right; margin-bottom:1rem; }
    .form-grp label { display:block; font-family:'Cairo',sans-serif; font-size:0.82rem; color:#555; margin-bottom:0.3rem; font-weight:600; }
    .form-grp input { width:100%; padding:0.65rem 0.9rem; border:1.5px solid #ddd; border-radius:7px; font-family:'Cairo',sans-serif; font-size:0.9rem; transition:border-color 0.2s; }
    .form-grp input:focus { outline:none; border-color:var(--buttonColor); }
    .btn-auth { width:100%; background:var(--buttonColor); color:#fff; padding:0.75rem; border-radius:8px; font-family:'Cairo',sans-serif; font-weight:700; font-size:0.95rem; cursor:pointer; margin-top:0.5rem; transition:0.2s; }
    .btn-auth:hover { background:#1565c0; }
    .auth-switch { font-family:'Cairo',sans-serif; font-size:0.85rem; color:#777; margin-top:1rem; }
    .auth-switch a { color:var(--buttonColor); font-weight:700; }
    .back-home { display:inline-block; margin-top:1rem; font-family:'Cairo',sans-serif; font-size:0.82rem; color:#aaa; }
    .back-home:hover { color:var(--bodyFont); }
  </style>
</body>
</html>
