<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="../images/bag-shopping-solid.svg" type="image/x-icon">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/pages/cart.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/pages/footer.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>سلة المشتريات — الحديدي</title>
</head>
<body>
  <div class="container">
    <header class="flex">
      <a href="../index.html" class="logo">
        <i class="fa-solid fa-bag-shopping"></i>
        <span>الحديدي</span>
        <p>شوبينج</p>
      </a>
      <div class="links">
        <a href="../index.html" class="cart">
          <i class="fa-solid fa-cart-shopping"></i>
          <span id="header-total">0.00 ج.م</span>
          <span class="proudct-number" id="header-count">0</span>
        </a>
        <a href="./signin.html" class="sign"><i class="fa-solid fa-right-to-bracket"></i>تسجيل الدخول</a>
        <a href="./register.html" class="register"><i class="fa-solid fa-user-plus"></i>إنشاء حساب</a>
      </div>
    </header>

    <main>
      <h1 class="cart-page-title"><i class="fa-solid fa-cart-shopping"></i> سلة المشتريات</h1>
      <section class="main-cart" id="cart-items-list">
        <!-- تُولَّد بـ JS -->
      </section>

      <div class="cart-actions" id="cart-actions" style="display:none;">
        <button class="claer" onclick="clearCart()">
          <i class="fa-solid fa-trash-can"></i> إفراغ السلة
        </button>
      </div>

      <div class="cart-empty-page" id="cart-empty-page">
        <i class="fa-solid fa-cart-shopping"></i>
        <p>السلة فارغة — <a href="../index.html">تسوق الآن</a></p>
      </div>

      <section class="summary" id="cart-summary" style="display:none;">
        <h1>ملخص الطلب</h1>
        <div class="sup flex">
          <p>المجموع الفرعي</p>
          <span id="cart-subtotal">0 ج.م</span>
        </div>
        <div class="sup flex">
          <p>الشحن</p>
          <span id="cart-shipping">مجاني</span>
        </div>
        <div class="sup flex total-line">
          <p><strong>الإجمالي</strong></p>
          <span id="cart-grand-total"><strong>0 ج.م</strong></span>
        </div>
        <button class="check"><i class="fa-solid fa-lock"></i> إتمام الشراء</button>
        <a href="./signin.html">
          <p>سجل دخولك لإتمام الطلب</p>
        </a>
      </section>
    </main>

    <footer>صُمم وطُوِّر بواسطة <span>أحمد الحديدي</span> © 2024</footer>
  </div>

  <div class="toast-msg" id="toast"><span id="toast-text"></span></div>

  <script>
    // قراءة السلة من localStorage
    let cart = JSON.parse(localStorage.getItem('hd_cart') || '[]');

    function saveCart() { localStorage.setItem('hd_cart', JSON.stringify(cart)); }

    function renderCart() {
      const list    = document.getElementById('cart-items-list');
      const actions = document.getElementById('cart-actions');
      const summary = document.getElementById('cart-summary');
      const emptyEl = document.getElementById('cart-empty-page');

      const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
      const count = cart.reduce((s, i) => s + i.qty, 0);

      document.getElementById('header-total').textContent = total.toLocaleString('ar-EG') + ' ج.م';
      document.getElementById('header-count').textContent = count;

      if (cart.length === 0) {
        list.innerHTML = '';
        actions.style.display = 'none';
        summary.style.display = 'none';
        emptyEl.style.display = 'block';
        return;
      }

      emptyEl.style.display = 'none';
      actions.style.display = 'block';
      summary.style.display = 'block';

      list.innerHTML = cart.map(item => `
        <article class="proudct flex">
          <button class="delete" onclick="removeItem(${item.id})">
            <i class="fa-solid fa-trash-can" style="color:#e12323;"></i>
          </button>
          <span class="price">${(item.price * item.qty).toLocaleString('ar-EG')} ج.م</span>
          <button class="minus" onclick="changeQty(${item.id}, -1)">
            <i class="fa-solid fa-minus" style="color:var(--buttonColor);"></i>
          </button>
          <span class="stock">${item.qty}</span>
          <button class="plus" onclick="changeQty(${item.id}, 1)">
            <i class="fa-solid fa-plus" style="color:var(--buttonColor);"></i>
          </button>
          <h2 class="proudct-name">${item.name}</h2>
          <img style="width:55px;height:55px;object-fit:cover;border-radius:5px;"
               src="${item.img || ''}" alt="${item.name}"
               onerror="this.src='https://via.placeholder.com/55?text=منتج'">
        </article>
      `).join('');

      const shipping = total >= 99 ? 'مجاني' : '30 ج.م';
      const grand    = total >= 99 ? total : total + 30;
      document.getElementById('cart-subtotal').textContent    = total.toLocaleString('ar-EG') + ' ج.م';
      document.getElementById('cart-shipping').textContent    = shipping;
      document.getElementById('cart-grand-total').innerHTML   = '<strong>' + grand.toLocaleString('ar-EG') + ' ج.م</strong>';
    }

    function changeQty(id, delta) {
      const item = cart.find(x => x.id === id);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) { removeItem(id); return; }
      saveCart();
      renderCart();
    }

    function removeItem(id) {
      cart = cart.filter(x => x.id !== id);
      saveCart();
      renderCart();
      showToast('تم حذف المنتج');
    }

    function clearCart() {
      cart = [];
      saveCart();
      renderCart();
      showToast('تم إفراغ السلة');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      document.getElementById('toast-text').textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    renderCart();
  </script>
</body>
</html>
