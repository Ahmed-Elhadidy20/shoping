<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="/images/bag-shopping-solid.svg" type="image/x-icon">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/pages/index.css">
  <link rel="stylesheet" href="/css/pages/footer.css">
  <link rel="stylesheet" href="/css/pages/bootstrap.min.css">
  <link rel="stylesheet" href="/css/pages/register.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>body, * { font-family: 'Cairo', sans-serif; }</style>
  <title>إنشاء حساب</title>
</head>
<body class="container text-center text-bg-dark">
  <header class="flex">
    <a href="/index.html" class="logo">
      <i class="fa-solid fa-bag-shopping"></i>
      <span>الحديدي</span>
      <p>تسوق</p>
    </a>
    <div class="links">
      <a href="" class="cart"><i class="fa-solid fa-cart-shopping"></i>
        ج.م 0.00<span class="proudct-number">2</span>
        <a href="./signin.html" class="sign"><i class="fa-solid fa-right-to-bracket"></i>تسجيل الدخول</a>
        <a href="" class="register"><i class="fa-solid fa-user-plus"></i>إنشاء حساب</a>
    </div>
  </header>

  <main class="px-3">
    <form>
      <div class="mb-4">
        <label for="inputUsername" class="form-label">اسم المستخدم</label>
        <input type="text" class="form-control" id="inputUsername">
      </div>
      <div class="mb-4">
        <label for="inputEmail" class="form-label">البريد الإلكتروني</label>
        <input type="email" class="form-control" id="inputEmail" aria-describedby="emailHelp">
        <div id="emailHelp" class="form-text">لن نشارك بريدك الإلكتروني مع أي طرف آخر.</div>
      </div>
      <div class="mb-4">
        <label for="inputPassword" class="form-label">كلمة المرور</label>
        <input type="password" class="form-control" id="inputPassword">
      </div>
      <div class="mb-4 form-check">
        <input type="checkbox" class="form-check-input" id="agreeCheck">
        <label class="form-check-label" for="agreeCheck">أوافق على الشروط والأحكام</label>
      </div>
      <button type="submit" class="btn btn-primary">إنشاء حساب</button>
    </form>
  </main>

  <footer>تصميم وتطوير <span>أحمد الحديدي</span> © 2024</footer>
</body>
</html>
